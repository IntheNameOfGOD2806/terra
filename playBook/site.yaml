
- hosts: web-servers
  become: yes
  pre_tasks:
    - name: install update(CentOS)
      dnf:
        update_cache: yes
        update_only: yes
      when: ansible_distribution in ["CentOS", "RedHat"]
    - name: install update(Ubuntu)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_distribution in ["Ubuntu", "Debian"]





- hosts: web-servers
  become: yes
  tasks:
    - name: Fix Ubuntu mirror (avoid AWS 503)
      replace:
        path: /etc/apt/sources.list.d/ubuntu.sources
        regexp: "http://ap-southeast-1.ec2.archive.ubuntu.com/ubuntu"
        replace: "http://archive.ubuntu.com/ubuntu"

    - name: Update apt cache after mirror fix
      apt:
        update_cache: yes
    - name: install apache2 and php package
      apt:
        name:
          - "{{apache_package}}"
          - "{{php_package}}"
        state: latest
        update_cache: yes
      when: ansible_distribution in ["Ubuntu", "Debian"]
 
    - name: install httpd and php package
      yum:
        name:
          - "{{apache_package}}"
          - "{{php_package}}"
        state: latest
        update_cache: yes 
      when: ansible_distribution in ["CentOS", "RedHat"]  


- hosts: web-server
  become: yes
  tasks:
    - name: Fix Ubuntu mirror (avoid AWS 503)
      replace:
        path: /etc/apt/sources.list.d/ubuntu.sources
        regexp: "http://ap-southeast-1.ec2.archive.ubuntu.com/ubuntu"
        replace: "http://archive.ubuntu.com/ubuntu"

    - name: Update apt cache after mirror fix
      apt:
        update_cache: yes
    - name: install mariadb-server package
      apt:
        name: mariadb-server
        state: latest
        update_cache: yes
      when: ansible_distribution in ["Ubuntu", "Debian"]