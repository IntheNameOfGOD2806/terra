---
- name: Install AWS CLI v2
  hosts: h2q-105
  become: true
  tasks:
    - name: Fix Ubuntu mirror (avoid AWS 503)
      replace:
        path: /etc/apt/sources.list.d/ubuntu.sources
        regexp: "http://ap-southeast-1.ec2.archive.ubuntu.com/ubuntu"
        replace: "http://archive.ubuntu.com/ubuntu"

    - name: Update apt cache after mirror fix
      apt:
        update_cache: yes
    - name: Install dependencies (unzip)
      ansible.builtin.package:
        name: unzip
        state: present

    - name: Download AWS CLI installer
      ansible.builtin.get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: "/tmp/awscliv2.zip"
        mode: '0644'

    - name: Unarchive the installer
      ansible.builtin.unarchive:
        src: "/tmp/awscliv2.zip"
        dest: "/tmp"
        remote_src: yes

    - name: Run the install script
      ansible.builtin.command:
        cmd: "./aws/install --update"
        chdir: "/tmp"
        creates: "/usr/local/bin/aws"

    - name: Verify installation
      ansible.builtin.command:
        cmd: "aws --version"
      register: aws_version

    - name: Show AWS CLI version
      ansible.builtin.debug:
        msg: "Installed: {{ aws_version.stdout }}"