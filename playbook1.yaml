- name: Deploy trang web dau tien
  hosts: local
  become: yes
  vars:
    my_name: "Tran Thanh Dat"
  tasks:
    - name: Fix Ubuntu mirror (avoid AWS 503)
      replace:
        path: /etc/apt/sources.list.d/ubuntu.sources
        regexp: "http://ap-southeast-1.ec2.archive.ubuntu.com/ubuntu"
        replace: "http://archive.ubuntu.com/ubuntu"

    - name: Update apt cache after mirror fix
      apt:
        update_cache: yes
    - name: update package
      apt:
        update_cache: yes
      ignore_errors: yes
    - name: Cai dat Nginx
      apt:
        name: nginx
        state: absent
    - name: Tao file index.html cho website
      template:
        src: index.html.j2
        dest: /var/www/html/index.html
        mode: "0644" # Set quyen file (optional)
    - name: Thong bao hoan tat
      debug:
        msg: "File index.html da duoc tao tai thu muc hien tai!"
